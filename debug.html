<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>调试页面</title>
<style>
body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #fff; }
.log { background: #16213e; padding: 10px; margin: 10px 0; border-radius: 5px; }
.error { background: #7f1d1d; }
.success { background: #14532d; }
.btn { padding: 10px 20px; background: #c9a227; border: none; cursor: pointer; margin: 10px; }
</style>
</head>
<body>
<h1>武魂模拟器调试工具</h1>
<button class="btn" onclick="testAll()">运行全部测试</button>
<div id="results"></div>

<script type="module">
window.testResults = [];
function log(msg, type = 'log') {
  const div = document.createElement('div');
  div.className = 'log ' + type;
  div.textContent = msg;
  document.getElementById('results').appendChild(div);
  window.testResults.push({ msg, type });
}

function testAll() {
  document.getElementById('results').innerHTML = '';
  
  // 测试 1: 检查 DOM 元素
  log('=== 测试 1: 检查 DOM 元素 ===');
  const sa = document.getElementById('SA');
  log(`#SA 存在: ${!!sa}`, sa ? 'success' : 'error');
  if (sa) {
    log(`#SA display: ${getComputedStyle(sa).display}`);
    log(`#SA visibility: ${getComputedStyle(sa).visibility}`);
    log(`#SA z-index: ${getComputedStyle(sa).zIndex}`);
    log(`#SA position: ${getComputedStyle(sa).position}`);
    
    const awBtn = sa.querySelector('.aw-btn');
    log(`.aw-btn 存在: ${!!awBtn}`, awBtn ? 'success' : 'error');
    
    const awC = sa.querySelector('.aw-c');
    log(`.aw-c 存在: ${!!awC}`, awC ? 'success' : 'error');
  }

  // 测试 2: 检查全局函数
  log('=== 测试 2: 检查全局函数 ===');
  log(`triggerAwaken 存在: ${typeof window.triggerAwaken === 'function'}`, typeof window.triggerAwaken === 'function' ? 'success' : 'error');
  log(`closeResult 存在: ${typeof window.closeResult === 'function'}`, typeof window.closeResult === 'function' ? 'success' : 'error');
  log(`$ 存在: ${typeof window.$ === 'function'}`, typeof window.$ === 'function' ? 'success' : 'error');

  // 测试 3: 检查关键数据
  log('=== 测试 3: 检查关键数据 ===');
  log(`G 存在: ${!!window.G}`, !!window.G ? 'success' : 'error');
  if (window.G) {
    log(`G.awakenDone: ${G.awakenDone}`);
    log(`G.soul: ${JSON.stringify(G.soul) || 'null'}`);
  }
  log(`QC 存在: ${!!window.QC}`, !!window.QC ? 'success' : 'error');
  log(`SD 存在: ${!!window.SD}`, !!window.SD ? 'success' : 'error');
  log(`pick 存在: ${typeof window.pick === 'function'}`, typeof window.pick === 'function' ? 'success' : 'error');
  log(`getQK 存在: ${typeof window.getQK === 'function'}`, typeof window.getQK === 'function' ? 'success' : 'error');

  // 测试 4: 尝试执行 triggerAwaken
  log('=== 测试 4: 尝试执行 triggerAwaken ===');
  try {
    if (typeof window.triggerAwaken === 'function') {
      window.triggerAwaken();
      log('triggerAwaken() 执行成功!', 'success');
    } else {
      log('triggerAwaken 不是函数，无法执行', 'error');
    }
  } catch (err) {
    log(`triggerAwaken() 错误: ${err.message}\n${err.stack}`, 'error');
  }

  // 测试 5: 检查 OR 结果层
  log('=== 测试 5: 检查结果覆盖层 ===');
  const or = document.getElementById('OR');
  log(`#OR 存在: ${!!or}`, or ? 'success' : 'error');
  if (or) {
    log(`#OR 显示状态: ${or.classList.contains('show') ? '显示' : '隐藏'}`);
  }
}

// 页面加载完成后自动运行
setTimeout(testAll, 2000);

// 暴露给全局
window.testAll = testAll;
</script>
</body>
</html>
